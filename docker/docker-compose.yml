services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/pxt
    ports:
      - "8000:8000"
    volumes:
      - ../schwab_token.json:/app/schwab_token.json:ro

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
