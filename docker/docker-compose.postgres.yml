# Standalone Postgres only (same credentials as docker-compose.yml / README)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pxt
      POSTGRES_USER: cx_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cx_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cx_user -d pxt"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
